services:
  - type: web
    name: backend-ecommerce
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install --only-binary=:all: --no-build-isolation -r requirements.txt && chmod +x startup.sh"
    startCommand: "./startup.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
    buildFilters:
      - path: .venv
        type: ignored
      - path: __pycache__
        type: ignored

databases:
  - name: ecommerce-db
    databaseName: ecommerce
    user: ecommerce_user
    plan: free
